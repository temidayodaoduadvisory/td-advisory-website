kind = "slides"
previewPath = "/td-advisory-deck/"
title = "TD Advisory Capabilities Deck"
version = "1.0.0"
id = "artifacts/td-advisory-deck"
router = "path"

[[integratedSkills]]
name = "slides"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/td-advisory-deck/" ]
localPort = 18125

[services.development]
run = "pnpm --filter @workspace/td-advisory-deck run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/td-advisory-deck", "run", "build" ]
publicDir = "artifacts/td-advisory-deck/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18125"
BASE_PATH = "/td-advisory-deck/"
