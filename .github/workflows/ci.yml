name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & test (site)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (app)
        run: pnpm --filter @workspace/site run typecheck

      - name: Typecheck (tests)
        run: pnpm --filter @workspace/site run typecheck:test

      - name: Unit tests (Vitest)
        run: pnpm --filter @workspace/site run test

      - name: Production build
        run: pnpm --filter @workspace/site run build

      - name: Install Playwright Chromium
        run: pnpm --filter @workspace/site exec playwright install --with-deps chromium

      - name: E2E + a11y tests (Playwright / Chrome)
        run: pnpm --filter @workspace/site run e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: artifacts/site/playwright-report/
          retention-days: 7
