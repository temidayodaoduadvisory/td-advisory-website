# ============================================================================
# SECURITY: Minimum release age for npm packages (supply-chain attack defense)
# ============================================================================
# Any npm package version must have been published for at least 1 day (1440
# minutes) before pnpm will install it. Malicious npm releases are usually
# discovered and pulled within hours, so this delay is a strong safety buffer.
# DO NOT DISABLE. To install something newer for an urgent fix, add it to a
# `minimumReleaseAgeExclude` list — and only for trusted publishers.
# ============================================================================
minimumReleaseAge: 1440

packages:
  - artifacts/*
  - lib/*

catalog:
  '@tailwindcss/vite': ^4.1.14
  '@tanstack/react-query': ^5.90.21
  '@types/node': ^25.3.3
  '@types/react': ^19.2.0
  '@types/react-dom': ^19.2.0
  '@vitejs/plugin-react': ^5.0.4
  class-variance-authority: ^0.7.1
  clsx: ^2.1.1
  framer-motion: ^12.23.24
  lucide-react: ^0.545.0
  # Pinned so the whole workspace resolves a single copy of React.
  react: 19.1.0
  react-dom: 19.1.0
  tailwind-merge: ^3.3.1
  tailwindcss: ^4.1.14
  vite: ^7.3.2
  wouter: ^3.7.1
  zod: ^3.25.76

autoInstallPeers: false

onlyBuiltDependencies:
  - '@swc/core'
  - esbuild
  - msw
  - unrs-resolver

overrides:
  # Pin esbuild to a known-good version across the workspace.
  esbuild: "0.27.3"
